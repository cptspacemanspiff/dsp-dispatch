# Results publishing:
#   - The `benchmarks` (x86) and `benchmarks-arm` jobs collate results and upload
#     them as artifacts; each also writes its tables to the job summary.
#   - The `publish` job then deploys the charts to GitHub Pages and posts one
#     sticky PR comment with the tables + inline chart images (see that job for
#     the required one-time Pages setup).
name: build-test-benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      min_time:
        description: "Google Benchmark --benchmark_min_time per case"
        default: "0.2s"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Correctness (x86): build the production library with each implemented FFT
  # backend and run the full normalized test suite against it.
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [portable, mkl, aocl, cmsis]
    name: fft-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # Cache keys are scoped by repository name on purpose: FetchContent
      # subbuilds (e.g. AOCL-FFTZ) bake the absolute build path into their
      # CMakeCache.txt, so a cache saved under a different repo/runner path is
      # rejected at configure time. Scoping by ${{ github.event.repository.name }}
      # keeps a rename (fft-dispatch -> dsp-dispatch) from poisoning the cache.
      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/_mkl
          key: deps-${{ github.event.repository.name }}-${{ runner.os }}-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-${{ runner.os }}-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=${{ matrix.backend }} -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Correctness (x86): build the library with each implemented FIR backend and
  # run the suite (fir_tests exercises the selected FIR backend; fft_tests uses
  # the portable FFT backend). IPP is omitted here to avoid the Intel-wheel/uv
  # dependency; it is covered by the benchmark smoke build when enabled.
  fir-backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [portable, liquid, cmsis]
    name: fir-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ github.event.repository.name }}-fir-${{ runner.os }}-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-fir-${{ runner.os }}-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=portable -DFIR_BACKEND=${{ matrix.backend }}
                   -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Correctness (Arm/aarch64): the ARM-native backends. CMSIS uses the portable
  # host build here (dependency-free; the compiler auto-vectorizes to NEON at -O3
  # on armv8-a). CMSIS's hand-written NEON-intrinsic kernels need CMSIS-Core and
  # are opt-in via -DCMSISDSP_USE_NEON=ON -DCMSISCORE=<path>.
  #
  # Uses a GitHub-hosted Arm64 Linux runner (free for public repos; Team/
  # Enterprise plans for private). If unavailable, swap to a QEMU cross build
  # (docker/setup-qemu-action + an arm64 container) at the cost of speed.
  backend-tests-arm:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        backend: [portable, cmsis]
    name: arm-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ github.event.repository.name }}-arm-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-arm-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=${{ matrix.backend }} -DFIR_BACKEND=${{ matrix.backend }}
                   -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Benchmarks (x86): build every fetchable FFT and FIR backend, run both suites,
  # and collate JSON -> tables + CSV + graph. Shared-runner numbers are a smoke
  # signal (the code compiles and runs), NOT regression-grade measurements.
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # FetchIPP shells out to `uv pip install` for Intel's ipp-static/ipp-devel
      # wheels (unlike FetchMKL, which self-downloads). uv is not on the default
      # runner image, so make it available for the IPP configure step.
      - name: Install uv (for FetchIPP)
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plotting deps
        run: python -m pip install --upgrade matplotlib

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/_mkl
            build/_ipp
          key: deps-${{ github.event.repository.name }}-${{ runner.os }}-bench-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-${{ runner.os }}-bench-

      - name: Configure (FFT + FIR backends)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_ENABLE_BENCHMARKS=ON
                   -DFFT_ENABLE_KFR_BENCHMARK=ON
                   -DFFT_ENABLE_MKL_BENCHMARK=ON
                   -DFFT_ENABLE_AOCL_BENCHMARK=ON
                   -DFFT_ENABLE_CMSIS_BENCHMARK=ON
                   -DFIR_ENABLE_LIQUID_BENCHMARK=ON
                   -DFIR_ENABLE_KFR_BENCHMARK=ON
                   -DFIR_ENABLE_IPP_BENCHMARK=ON
                   -DFIR_ENABLE_CMSIS_BENCHMARK=ON

      - name: Build benchmark executables
        run: cmake --build build --target
                   fft_bench_portable fft_bench_kfr fft_bench_mkl fft_bench_aocl fft_bench_cmsis
                   fir_bench_portable fir_bench_liquid fir_bench_kfr fir_bench_ipp fir_bench_cmsis

      - name: Run + collate FFT benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fft
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Run + collate FIR benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fir
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## Benchmark results (smoke — shared runner, not regression-grade)"
            echo ""
            echo "### FFT"
            cat bench_results/fft_results.md 2>/dev/null || echo "_no FFT results_"
            echo ""
            echo "### FIR"
            cat bench_results/fir_results.md 2>/dev/null || echo "_no FIR results_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-x86
          path: |
            bench_results/*_results.md
            bench_results/*_results.csv
            bench_results/*_latency.png
            bench_results/*.json

  # Benchmarks (Arm/aarch64): smoke the portable and CMSIS(NEON) backends for
  # both suites on a native Arm64 runner. Same "smoke, not regression" caveat.
  benchmarks-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plotting deps
        run: python -m pip install --upgrade matplotlib

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ github.event.repository.name }}-arm-bench-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-arm-bench-

      - name: Configure (portable + CMSIS)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_ENABLE_BENCHMARKS=ON
                   -DFFT_ENABLE_CMSIS_BENCHMARK=ON
                   -DFIR_ENABLE_CMSIS_BENCHMARK=ON

      - name: Build benchmark executables
        run: cmake --build build --target
                   fft_bench_portable fft_bench_cmsis
                   fir_bench_portable fir_bench_cmsis

      - name: Run + collate FFT benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fft
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Run + collate FIR benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fir
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## Arm64 benchmark results (smoke — shared runner, not regression-grade)"
            echo ""
            echo "### FFT"
            cat bench_results/fft_results.md 2>/dev/null || echo "_no FFT results_"
            echo ""
            echo "### FIR"
            cat bench_results/fir_results.md 2>/dev/null || echo "_no FIR results_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-arm
          path: |
            bench_results/*_results.md
            bench_results/*_results.csv
            bench_results/*_latency.png
            bench_results/*.json

  # Publish the docs site (with the interactive benchmark dashboard) to GitHub
  # Pages, and post ONE sticky PR comment with each PR's charts + tables. A
  # single deploy job (rather than each benchmark job) avoids two runners racing
  # to push the gh-pages branch.
  #
  #   - On push to main: collate the benchmark JSON into the dashboard data,
  #     build the MkDocs site, and deploy it to the Pages ROOT (keep_files:true
  #     preserves any pr-<n>/ preview dirs). This is the live site.
  #   - On pull_request: deploy just this PR's latency PNGs to a pr-<n>/ subdir
  #     and post a sticky comment linking them + the tables. The interactive
  #     dashboard tracks main only.
  #
  # ONE-TIME SETUP: point Pages at the gh-pages branch —
  #   Settings -> Pages -> Source: "Deploy from a branch" -> Branch: gh-pages, / (root).
  # The first run creates gh-pages; there's a short delay after each deploy while
  # Pages rebuilds before the new content is served.
  publish:
    needs: [benchmarks, benchmarks-arm]
    if: >-
      !cancelled()
      && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
        || (github.event_name == 'pull_request'
            && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push to the gh-pages branch
      pull-requests: write   # post the sticky comment
    steps:
      - uses: actions/checkout@v4   # need docs/, mkdocs.yml, tools/ to build

      - name: Download x86 results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results-x86
          path: results/x86

      - name: Download Arm64 results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results-arm
          path: results/arm

      # ---------- main: build + deploy the full docs site ----------
      - name: Set up Python
        if: github.event_name == 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        if: github.event_name == 'push'
        run: python -m pip install --upgrade mkdocs-material

      - name: Generate dashboard data
        if: github.event_name == 'push'
        run: |
          python tools/build_dashboard.py \
            --arch x86:x86_64:results/x86 \
            --arch arm:Arm64:results/arm \
            --commit "${{ github.sha }}" \
            --generated "$(date -u +'%Y-%m-%d %H:%MZ')" \
            --out docs/assets/bench-data.js

      - name: Build docs site
        if: github.event_name == 'push'
        run: mkdocs build --strict --site-dir site

      - name: Deploy docs site to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true       # preserve pr-<n>/ preview dirs at the root

      # ---------- pull_request: sticky comment with this PR's charts + tables ----------
      - name: Assemble PR comment + preview charts
        if: github.event_name == 'pull_request'
        id: assemble
        run: |
          set -e
          SUBDIR="pr-${{ github.event.pull_request.number }}"
          echo "subdir=$SUBDIR" >> "$GITHUB_OUTPUT"
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo="${{ github.event.repository.name }}"
          IMGBASE="https://${owner}.github.io/${repo}/${SUBDIR}"
          SITEBASE="https://${owner}.github.io/${repo}"

          mkdir -p prsite
          {
            echo "## Benchmarks — \`${{ github.sha }}\`"
            echo ""
            echo "📊 [Live dashboard (main)](${SITEBASE}/benchmarks/) · charts below are this PR's smoke run — _shared runners, not regression-grade_"
          } > comment.md

          for arch in x86 arm; do
            src="results/${arch}"
            [ -d "$src" ] || continue
            [ "$arch" = "x86" ] && label="x86_64" || label="Arm64"
            mkdir -p "prsite/${arch}"
            cp "$src"/*_latency.png "prsite/${arch}/" 2>/dev/null || true

            printf '\n### %s\n\n' "$label" >> comment.md
            for suite in fft fir; do
              png="${suite}_latency.png"
              if [ -f "prsite/${arch}/${png}" ]; then
                echo "![${label} ${suite} latency](${IMGBASE}/${arch}/${png})" >> comment.md
              fi
            done
            printf '\n<details><summary>%s tables</summary>\n\n' "$label" >> comment.md
            for suite in fft fir; do
              md="${src}/${suite}_results.md"
              [ -f "$md" ] && { cat "$md" >> comment.md; printf '\n' >> comment.md; }
            done
            printf '</details>\n' >> comment.md
          done

      - name: Deploy PR preview charts
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./prsite
          destination_dir: ${{ steps.assemble.outputs.subdir }}
          keep_files: true

      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmarks
          path: comment.md
