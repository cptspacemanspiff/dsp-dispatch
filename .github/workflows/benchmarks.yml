# Correctness tests (`backend-tests`, `fir-backend-tests`, `backend-tests-arm`)
# run on every push to main and every pull request.
#
# Benchmarks are MANUAL-ONLY. The `benchmarks` (x86), `benchmarks-arm`, and
# `publish` jobs run solely via workflow_dispatch on the main branch (Actions tab
# -> "build-test-benchmark" -> Run workflow, with Branch: main). This keeps the
# expensive multi-backend benchmark build off the push/PR path and off non-main
# branches; request a run when you actually want fresh numbers.
#   - `benchmarks` / `benchmarks-arm` collate results, upload them as artifacts,
#     and write their tables to the job summary.
#   - `publish` then deploys the charts to the GitHub Pages dashboard (see that
#     job for the required one-time Pages setup).
name: build-test-benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      min_time:
        description: "Google Benchmark --benchmark_min_time per case"
        default: "0.2s"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Discover which library backends are testable on each architecture. CMake is
  # the single source of truth: a throwaway portable configure (fetches nothing)
  # writes build/testable_backends.json, and this job republishes those per-arch
  # lists as outputs that every test matrix below consumes via fromJson. Adding a
  # backend in CMakeLists.txt updates CI automatically -- no backend list is
  # hardcoded in this workflow.
  setup:
    runs-on: ubuntu-latest
    outputs:
      fft_x86: ${{ steps.matrix.outputs.fft_x86 }}
      fft_arm: ${{ steps.matrix.outputs.fft_arm }}
      fir_x86: ${{ steps.matrix.outputs.fir_x86 }}
      fir_arm: ${{ steps.matrix.outputs.fir_arm }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Emit backend manifest (portable configure, no deps fetched)
        run: cmake -S . -B build -G Ninja
                   -DFFT_BACKEND=portable -DFIR_BACKEND=portable
                   -DFFT_BUILD_TESTS=OFF

      - name: Publish per-arch backend lists
        id: matrix
        run: |
          json=build/testable_backends.json
          {
            echo "fft_x86=$(jq -c '.fft.x86' "$json")"
            echo "fft_arm=$(jq -c '.fft.arm' "$json")"
            echo "fir_x86=$(jq -c '.fir.x86' "$json")"
            echo "fir_arm=$(jq -c '.fir.arm' "$json")"
          } >> "$GITHUB_OUTPUT"

  # Correctness (FFT, x86): build the production library with each x86-testable
  # FFT backend and run the full normalized suite against it. The backend list
  # comes from the setup job, not a hardcoded matrix.
  backend-tests:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: ${{ fromJson(needs.setup.outputs.fft_x86) }}
    name: fft-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # Cache keys are scoped by repository name on purpose: FetchContent
      # subbuilds (e.g. AOCL-FFTZ) bake the absolute build path into their
      # CMakeCache.txt, so a cache saved under a different repo/runner path is
      # rejected at configure time. Scoping by ${{ github.event.repository.name }}
      # keeps a rename (fft-dispatch -> dsp-dispatch) from poisoning the cache.
      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/_mkl
          key: deps-${{ github.event.repository.name }}-${{ runner.os }}-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-${{ runner.os }}-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=${{ matrix.backend }} -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Correctness (FIR, x86): build the library with each x86-testable FIR backend
  # (fir_tests exercises the selected FIR backend; fft_tests uses the portable
  # FFT backend). The ipp backend resolves Intel's static wheels via uv, so uv +
  # Python are installed only for that matrix leg.
  fir-backend-tests:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: ${{ fromJson(needs.setup.outputs.fir_x86) }}
    name: fir-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # FetchIPP shells out to `uv pip install` for Intel's ipp-static/ipp-devel
      # wheels; uv needs a Python to target. Only the ipp leg pulls this in.
      - name: Set up Python (IPP wheels)
        if: matrix.backend == 'ipp'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv (IPP wheels)
        if: matrix.backend == 'ipp'
        uses: astral-sh/setup-uv@v6

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/_ipp
          key: deps-${{ github.event.repository.name }}-fir-${{ runner.os }}-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-fir-${{ runner.os }}-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=portable -DFIR_BACKEND=${{ matrix.backend }}
                   -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Correctness (FFT, Arm/aarch64): each Arm-testable FFT backend on a native
  # Arm64 runner. CMSIS uses the portable host build here (dependency-free; the
  # compiler auto-vectorizes to NEON at -O3 on armv8-a). CMSIS's hand-written
  # NEON-intrinsic kernels need CMSIS-Core and are opt-in via
  # -DCMSISDSP_USE_NEON=ON -DCMSISCORE=<path>.
  #
  # Uses a GitHub-hosted Arm64 Linux runner (free for public repos; Team/
  # Enterprise plans for private). If unavailable, swap to a QEMU cross build
  # (docker/setup-qemu-action + an arm64 container) at the cost of speed.
  backend-tests-arm:
    needs: setup
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        backend: ${{ fromJson(needs.setup.outputs.fft_arm) }}
    name: arm-fft-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ github.event.repository.name }}-arm-fft-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-arm-fft-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=${{ matrix.backend }} -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Correctness (FIR, Arm/aarch64): each Arm-testable FIR backend (portable,
  # cmsis, liquid -- all portable C) paired with the portable FFT backend. This
  # is what closes the previous gap where Arm never exercised the liquid FIR path.
  fir-backend-tests-arm:
    needs: setup
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        backend: ${{ fromJson(needs.setup.outputs.fir_arm) }}
    name: arm-fir-tests (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ github.event.repository.name }}-arm-fir-${{ matrix.backend }}-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-arm-fir-${{ matrix.backend }}-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DFFT_BACKEND=portable -DFIR_BACKEND=${{ matrix.backend }}
                   -DFFT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Benchmarks (x86): build every fetchable FFT and FIR backend, run both suites,
  # and collate JSON -> tables + CSV + graph. Shared-runner numbers are a smoke
  # signal (the code compiles and runs), NOT regression-grade measurements.
  benchmarks:
    # Manual-only, main-only: benchmarks run solely when requested via
    # workflow_dispatch on the main branch, never on push or pull_request.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # FetchIPP shells out to `uv pip install` for Intel's ipp-static/ipp-devel
      # wheels (unlike FetchMKL, which self-downloads). uv is not on the default
      # runner image, so make it available for the IPP configure step.
      - name: Install uv (for FetchIPP)
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plotting deps
        run: python -m pip install --upgrade matplotlib

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/_mkl
            build/_ipp
          key: deps-${{ github.event.repository.name }}-${{ runner.os }}-bench-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-${{ runner.os }}-bench-

      # Enable every benchmark backend compatible with this host and let CMake
      # host-gate the set -- the same single source of truth as the correctness
      # matrix and exactly what `make benchmarks` uses. On x86 this expands to
      # FFT portable/kfr/mkl/aocl/cmsis/fftw and FIR portable/liquid/kfr/ipp/cmsis.
      # No backend list is hardcoded here, so a new backend (e.g. fftw) is picked
      # up automatically.
      - name: Configure (all host-compatible benchmark backends)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DDSP_ENABLE_ALL_BENCHMARKS=ON

      # The fft_benchmarks / fir_benchmarks aggregate targets build exactly the
      # fft_bench_* / fir_bench_* executables CMake configured for this host.
      - name: Build benchmark executables
        run: cmake --build build --target fft_benchmarks fir_benchmarks

      - name: Run + collate FFT benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fft
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Run + collate FIR benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fir
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## Benchmark results (smoke — shared runner, not regression-grade)"
            echo ""
            echo "### FFT"
            cat bench_results/fft_results.md 2>/dev/null || echo "_no FFT results_"
            echo ""
            echo "### FIR"
            cat bench_results/fir_results.md 2>/dev/null || echo "_no FIR results_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-x86
          path: |
            bench_results/*_results.md
            bench_results/*_results.csv
            bench_results/*_latency.png
            bench_results/*.json

  # Benchmarks (Arm/aarch64): smoke every Arm-compatible backend for both suites
  # on a native Arm64 runner -- CMake host-gates the set to FFT portable/cmsis/fftw
  # and FIR portable/cmsis/liquid (KFR is Clang-only on Arm, so gcc runners skip
  # it). Same "smoke, not regression" caveat.
  benchmarks-arm:
    # Manual-only, main-only (see the x86 `benchmarks` job).
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plotting deps
        run: python -m pip install --upgrade matplotlib

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ github.event.repository.name }}-arm-bench-${{ hashFiles('cmake/*.cmake', 'CMakeLists.txt', 'bench/CMakeLists.txt') }}
          restore-keys: deps-${{ github.event.repository.name }}-arm-bench-

      # Same host-gated switch as x86; on Arm it expands to FFT portable/cmsis/fftw
      # and FIR portable/cmsis/liquid. No backend list is hardcoded here.
      - name: Configure (all host-compatible benchmark backends)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
                   -DDSP_ENABLE_ALL_BENCHMARKS=ON

      # Aggregate targets build exactly what CMake configured for this host.
      - name: Build benchmark executables
        run: cmake --build build --target fft_benchmarks fir_benchmarks

      - name: Run + collate FFT benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fft
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Run + collate FIR benchmarks
        run: python tools/run_benchmarks.py --build-dir build --suite fir
                   --min-time "${{ github.event.inputs.min_time || '0.15s' }}"

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## Arm64 benchmark results (smoke — shared runner, not regression-grade)"
            echo ""
            echo "### FFT"
            cat bench_results/fft_results.md 2>/dev/null || echo "_no FFT results_"
            echo ""
            echo "### FIR"
            cat bench_results/fir_results.md 2>/dev/null || echo "_no FIR results_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-arm
          path: |
            bench_results/*_results.md
            bench_results/*_results.csv
            bench_results/*_latency.png
            bench_results/*.json

  # Publish the docs site (with the interactive benchmark dashboard) to GitHub
  # Pages. A single deploy job (rather than each benchmark job) avoids two runners
  # racing to push the gh-pages branch.
  #
  # Manual-only, main-only: this runs only for the workflow_dispatch benchmark run
  # on main (its `needs` are gated the same way). It collates the fresh benchmark
  # JSON into the dashboard data, builds the MkDocs site, and deploys it to the
  # Pages ROOT (keep_files:true preserves anything else already published).
  #
  # ONE-TIME SETUP: point Pages at the gh-pages branch —
  #   Settings -> Pages -> Source: "Deploy from a branch" -> Branch: gh-pages, / (root).
  # The first run creates gh-pages; there's a short delay after each deploy while
  # Pages rebuilds before the new content is served.
  publish:
    needs: [benchmarks, benchmarks-arm]
    if: >-
      !cancelled()
      && github.event_name == 'workflow_dispatch'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push to the gh-pages branch
    steps:
      - uses: actions/checkout@v4   # need docs/, mkdocs.yml, tools/ to build

      - name: Download x86 results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results-x86
          path: results/x86

      - name: Download Arm64 results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results-arm
          path: results/arm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: python -m pip install --upgrade mkdocs-material

      - name: Generate dashboard data
        run: |
          python tools/build_dashboard.py \
            --arch x86:x86_64:results/x86 \
            --arch arm:Arm64:results/arm \
            --commit "${{ github.sha }}" \
            --generated "$(date -u +'%Y-%m-%d %H:%MZ')" \
            --out docs/assets/bench-data.js

      - name: Build docs site
        run: mkdocs build --strict --site-dir site

      - name: Deploy docs site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
